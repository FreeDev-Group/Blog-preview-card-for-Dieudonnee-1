<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Blog preview card</title>

  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="page">
    <article class="card" aria-labelledby="card-title">
      <div class="card-media">
        <img src="images/illustration.png" alt="Photo d'illustration du post" />
      </div>

      <div class="card-body">
        <span class="tag">Learning</span>
        <p class="date">Published 21 Dec 2023</p>

        <h1 id="card-title" class="title">HTML &amp; CSS foundations</h1>
     <p class="excerpt">
          These languages are the backbone of every website, defining structure, content, and presentation.
        </p>

        <div class="author">
          <img class="avatar" src="images/image-avatar.webp" alt="Photo de l'auteur" />
          <span class="author-name">Greg Hooper</span>
        </div>
      </div>
    </article>
  </main>
</body>
</html>
